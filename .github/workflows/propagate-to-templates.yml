name: Propagate to Templates

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  propagate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout base template
        uses: actions/checkout@v4
        with:
          path: base

      - name: Checkout templates repo
        uses: actions/checkout@v4
        with:
          repository: VibeStackCodes/vibestack-templates
          token: ${{ secrets.TEMPLATES_REPO_TOKEN }}
          path: templates

      - name: Run propagation script
        id: sync
        run: bash base/.github/scripts/propagate.sh base templates

      - name: Generate matrix
        id: matrix
        if: steps.sync.outputs.changed == 'true'
        run: |
          cd templates
          DIRS=$(ls -d */ | sed 's/\///' | jq -R . | jq -sc '.')
          echo "matrix=$DIRS" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.sync.outputs.changed == 'true'
        run: |
          cd templates
          SHORT_SHA=$(cd ../base && git rev-parse --short HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync base template ($SHORT_SHA)"
          git push

  validate:
    needs: propagate
    if: needs.propagate.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.propagate.outputs.matrix) }}
    steps:
      - name: Checkout templates repo
        uses: actions/checkout@v4
        with:
          repository: VibeStackCodes/vibestack-templates
          token: ${{ secrets.TEMPLATES_REPO_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build template
        run: |
          cd ${{ matrix.template }}
          bun install --frozen-lockfile || bun install
          bun run build
